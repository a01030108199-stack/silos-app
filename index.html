<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>النظام الموحد للصوامع - تسجيل الدخول</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap');
  
  body.index-portal {
    background: #0f1623;
    height: 100vh;
    width: 100vw;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    margin: 0;
    font-family: 'Cairo', sans-serif;
    overflow: hidden;
  }
  
  .image-map-container {
    position: relative;
    width: 100%;
    height: 100%;
  }
  
  .bg-image {
    width: 100%;
    height: 100%;
    object-fit: fill;
    display: block;
  }

  /* ── Dynamic Stats (Left Panel) ── */
  .stat-patch {
    position: absolute;
    background: #111a28; /* Dark color to blend with the panel background */
    display: flex;
    align-items: center;
    justify-content: center;
    color: #eab308;
    font-weight: 800;
    z-index: 10;
    box-shadow: 0 0 10px 10px #111a28;
    border-radius: 4px;
    white-space: pre-line;
    text-align: center;
    line-height: 1.2;
  }

  #stat-capacity { top: 32%; left: 20%; width: 7%; height: 5%; font-size: 1.4vw; }
  #stat-regions { top: 46%; left: 20%; width: 5%; height: 4%; font-size: 1.5vw; }
  #stat-silos { top: 59%; left: 20%; width: 5%; height: 4%; font-size: 1.5vw; }
  
  #stat-stock { 
    top: 74%; left: 33%; width: 4.5%; height: 6.5%; 
    font-size: 1.2vw; color: #fff; background: #1f2d40; box-shadow: 0 0 5px 5px #1f2d40; border-radius: 50%;
  }
  
  #stat-shipments { 
    top: 73%; left: 20%; width: 6%; height: 6%; 
    font-size: 1vw; color: #fff; background: #111a28; box-shadow: 0 0 8px 6px #111a28;
  }

  /* ── Login Form (Right Panel) ── */
  .transparent-input {
    position: absolute;
    background: transparent;
    border: none;
    color: #fff;
    font-family: 'Cairo', sans-serif;
    font-size: 1.1vw;
    font-weight: 600;
    outline: none;
    z-index: 10;
    padding: 0 10px;
    text-align: right;
  }
  
  .transparent-input::placeholder { color: rgba(255,255,255,0.4); }
  .transparent-input option { color: #000; background: #fff; }

  #branchSelect { top: 27%; left: 71%; width: 17.5%; height: 4.5%; cursor: pointer; }
  #username { top: 42%; left: 71%; width: 17.5%; height: 4.5%; }
  #password { top: 56.5%; left: 71%; width: 17.5%; height: 4.5%; letter-spacing: 2px;}

  .transparent-btn {
    position: absolute;
    top: 71%; left: 71%; width: 18%; height: 6%;
    background: transparent;
    border: none;
    cursor: pointer;
    z-index: 10;
    color: transparent;
  }

  /* ── Error Message ── */
  .login-error {
    position: absolute;
    top: 83%; left: 74.5%; width: 15%;
    color: #ef4444; font-size: 1vw; font-weight: bold; text-align: center;
    background: rgba(15,22,35,0.9); padding: 5px; border-radius: 5px;
    display: none; z-index: 20;
  }

</style>
</head>
<body class="index-portal">

<div class="image-map-container">
  <img src="img/index_bg.jpg" class="bg-image" alt="EHCSS Portal">

  <!-- Left Panel Overlays (Masking original text) -->
  <div class="stat-patch" id="stat-capacity">3.1M<br><span style="font-size:0.7em">Ton</span></div>
  <div class="stat-patch" id="stat-regions">3</div>
  <div class="stat-patch" id="stat-silos">48</div>
  <div class="stat-patch" id="stat-stock">82%</div>
  <div class="stat-patch" id="stat-shipments">12 Trains<br>4 Ships</div>

  <!-- Right Panel Overlays (Inputs) -->
  <form onsubmit="handleLogin(event)">
    <select id="branchSelect" class="transparent-input" onchange="fillCreds(this.value)">
      <option value="">-- اختر الفرع للبدء --</option>
      <!-- General Admin -->
      <option value="admin">الإدارة العامة (Dashboard)</option>
    </select>
    
    <input type="text" id="username" class="transparent-input" placeholder="اسم المستخدم" required autocomplete="off">
    <input type="password" id="password" class="transparent-input" placeholder="كلمة المرور" required>
    
    <button type="submit" class="transparent-btn" id="loginBtn" title="تسجيل الدخول"></button>
    <div id="loginError" class="login-error">بيانات الدخول غير صحيحة</div>
  </form>
</div>

<script src="js/data.js?v=22"></script>
<script src="js/app.js?v=22"></script>
<script>
  // Auto-redirect
  if (Auth.current()) {
    const r = Auth.current().role;
    if (r === 'silo') window.location.href = 'pages/silo_portal.html?v=22';
    else if (r === 'scale') window.location.href = 'pages/reception.html?v=22';
    else if (r === 'security') window.location.href = 'pages/security.html?v=22';
    else if (r === 'finance') window.location.href = 'pages/finance.html?v=22';
    else if (r === 'maintenance') window.location.href = 'pages/maintenance.html?v=22';
    else window.location.href = 'pages/dashboard.html?v=22';
  }

  const select = document.getElementById('branchSelect');
  const storedUsers = JSON.parse(localStorage.getItem('USERS') || '[]');
  const usersToLoad = storedUsers.length > 0 ? storedUsers : (typeof USERS !== 'undefined' ? USERS : []);
  
  usersToLoad.filter(u => u.role === 'silo').forEach(u => {
    const opt = document.createElement('option');
    opt.value = u.username;
    opt.textContent = u.name;
    select.appendChild(opt);
  });

  function fillCreds(username) {
    if (!username) {
      document.getElementById('username').value = '';
      document.getElementById('password').value = '';
      return;
    }
    const user = usersToLoad.find(u => u.username === username);
    if (user) {
      document.getElementById('username').value = user.username;
      document.getElementById('password').value = user.password;
    }
  }

  function handleLogin(e) {
    e.preventDefault();
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value;
    
    const user = Auth.login(u, p);
    if (user) {
      const r = user.role;
      if (r === 'silo') window.location.href = 'pages/silo_portal.html?v=22';
      else if (r === 'scale') window.location.href = 'pages/reception.html?v=22';
      else if (r === 'security') window.location.href = 'pages/security.html?v=22';
      else if (r === 'finance') window.location.href = 'pages/finance.html?v=22';
      else if (r === 'maintenance') window.location.href = 'pages/maintenance.html?v=22';
      else window.location.href = 'pages/dashboard.html?v=22';
    } else {
      document.getElementById('loginError').style.display = 'block';
    }
  }

  document.getElementById('stat-regions').textContent = '3';
  document.getElementById('stat-silos').textContent = SILOS ? SILOS.length : '48';
  document.getElementById('stat-capacity').innerHTML = '3.1M<br><span style="font-size:0.7em">Ton</span>';
  document.getElementById('stat-stock').textContent = '82%';
  document.getElementById('stat-shipments').innerHTML = Math.floor(Math.random() * 20 + 5) + ' Trains<br>' + Math.floor(Math.random() * 5 + 1) + ' Ships';
</script>
</body>
</html>
