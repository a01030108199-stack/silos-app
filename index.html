<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول — نظام إدارة الصوامع</title>
<meta name="description" content="نظام متكامل لإدارة صوامع الشركة المصرية القابضة للصوامع والتخزين">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script src="js/firebase-db.js"></script></head>
<body class="login-page">
<div class="login-container">

  <!-- Brand Panel -->
  <div class="login-brand">
    <div class="brand-logo">
      <img src="img/logo.jpg" alt="EHCSS Logo" class="animated-logo">
    </div>
    <div class="brand-title">الشركة المصرية القابضة<br>للصوامع والتخزين</div>
    <div class="brand-sub">
      نظام إدارة الصوامع الموحد<br>
      يربط جميع صوامع الجمهورية بالإدارة العامة
    </div>
    <div class="brand-stats">
      <div class="brand-stat">
        <span class="num">48</span>
        <span class="lbl">صومعة</span>
      </div>
      <div class="brand-stat">
        <span class="num">7</span>
        <span class="lbl">مناطق</span>
      </div>
      <div class="brand-stat">
        <span class="num">3.1M</span>
        <span class="lbl">طن طاقة</span>
      </div>
    </div>
    
    <div class="designer-signature">
      <img src="img/signature.png" alt="تصميم وبرمجة / اكرم سعد">
    </div>
  </div>

  <!-- Login Form -->
  <div class="login-form-wrap">
    <div class="login-title">👋 أهلاً بك</div>
    <div class="login-subtitle">سجّل الدخول للوصول إلى لوحة التحكم</div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group" id="siloGroup">
        <label class="form-label">الفرع / الصومعة</label>
        <select id="siloSelect" class="form-input" onchange="toggleDept(this.value)" style="color:var(--text-primary);background:var(--bg-dark)" required>
          <option value="" style="color:#000;background:#fff">— اختر الفرع —</option>
          <option value="general_admin" style="color:#000;background:#fff; font-weight:bold;">الإدارة العامة</option>
          <!-- Options will be populated dynamically by JS -->
        </select>
      </div>

      <div class="form-group" id="deptGroup">
        <label class="form-label">القسم / الإدارة</label>
        <select id="deptSelect" class="form-input" style="color:var(--text-primary);background:var(--bg-dark)">
          <option value="" style="color:#000;background:#fff">— اختر الإدارة —</option>
          <option value="manager" style="color:#000;background:#fff">مدير الموقع</option>
          <option value="scale" style="color:#000;background:#fff">إدارة الميزان</option>
          <option value="security" style="color:#000;background:#fff">إدارة الأمن</option>
          <option value="finance" style="color:#000;background:#fff">الشئون المالية</option>
          <option value="maintenance" style="color:#000;background:#fff">الصيانة</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">كلمة المرور</label>
        <div class="form-input-icon">
          <input type="password" id="password" class="form-input" placeholder="كلمة المرور الافتراضية (123)" required>
          <i class="fa-solid fa-lock icon"></i>
        </div>
      </div>

      <button type="submit" class="btn-login">
        <i class="fa-solid fa-right-to-bracket"></i>
        تسجيل الدخول
      </button>
    </form>

    <div class="login-error" id="loginError">
      <i class="fa-solid fa-circle-xmark"></i>
      بيانات الدخول أو القسم غير صحيحة
    </div>

    <div class="demo-creds">
      <p><i class="fa-solid fa-circle-info"></i> كلمات المرور الافتراضية لجميع الأقسام هي: <span>123</span></p>
    </div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
  // Populate silos dropdown dynamically
  const select = document.getElementById('siloSelect');
  const storedSilos = JSON.parse(localStorage.getItem('SILOS') || '[]');
  const silosToLoad = storedSilos.length > 0 ? storedSilos : (typeof SILOS !== 'undefined' ? SILOS : []);
  
  silosToLoad.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.id;
    opt.textContent = s.name;
    opt.style.color = '#000';
    opt.style.background = '#fff';
    select.appendChild(opt);
  });

  function toggleDept(val) {
    const deptSelect = document.getElementById('deptSelect');
    if (val === 'general_admin') {
      deptSelect.value = '';
      deptSelect.disabled = true;
      document.getElementById('password').value = '123'; // auto fill for testing
    } else {
      deptSelect.disabled = false;
      document.getElementById('password').value = '123'; // auto fill for testing
    }
  }

  // Auto-redirect if already logged in
  if (Auth.current()) {
    const r = Auth.current().role;
    if (r === 'scale') window.location.href = 'pages/scale.html';
    else if (r === 'security') window.location.href = 'pages/security.html';
    else if (r === 'finance') window.location.href = 'pages/finance.html';
    else if (r === 'maintenance') window.location.href = 'pages/maintenance.html';
    else window.location.href = 'pages/dashboard.html';
  }

  function handleLogin(e) {
    e.preventDefault();
    const btn = e.target.querySelector('.btn-login');
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> جارٍ الدخول...';
    btn.disabled = true;

    setTimeout(() => {
      const siloVal = document.getElementById('siloSelect').value;
      const deptVal = document.getElementById('deptSelect').value;
      const p = document.getElementById('password').value;
      
      let role = siloVal === 'general_admin' ? 'general_admin' : deptVal;
      let siloId = siloVal === 'general_admin' ? null : parseInt(siloVal);

      if (siloVal !== 'general_admin' && !deptVal) {
        document.getElementById('loginError').style.display = 'flex';
        btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> تسجيل الدخول';
        btn.disabled = false;
        return;
      }

      const user = Auth.loginByRole(role, siloId, p);
      if (user) {
        if (role === 'scale') window.location.href = 'pages/scale.html';
        else if (role === 'security') window.location.href = 'pages/security.html';
        else if (role === 'finance') window.location.href = 'pages/finance.html';
        else if (role === 'maintenance') window.location.href = 'pages/maintenance.html';
        else window.location.href = 'pages/dashboard.html';
      } else {
        document.getElementById('loginError').style.display = 'flex';
        btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> تسجيل الدخول';
        btn.disabled = false;
      }
    }, 800);
  }
</script>
</body>
</html>
