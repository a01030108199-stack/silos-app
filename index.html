<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>النظام الموحد للصوامع - تسجيل الدخول</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap');
  
  body.index-portal {
    background: #0f1623;
    height: 100vh;
    width: 100vw;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    margin: 0;
    font-family: 'Cairo', sans-serif;
    overflow: hidden;
  }
  
  .image-map-container {
    position: relative;
    width: 100%;
    height: 100%;
  }
  
  .bg-image {
    width: 100%;
    height: 100%;
    object-fit: fill;
    display: block;
  }

  /* ── Panel Containers ── */
  .left-panel-container {
    position: absolute;
    top: 27.6%; left: 11.1%;
    width: 17.2%; height: 48.5%;
    display: flex; flex-direction: column; gap: 3%;
    padding: 0;
    box-sizing: border-box;
    z-index: 10;
  }

  .right-panel-container {
    position: absolute;
    top: 27.6%; left: 71.6%;
    width: 17.2%; height: 48.5%;
    display: flex; flex-direction: column; gap: 3%;
    padding: 0;
    box-sizing: border-box;
    z-index: 10;
  }

  .panel-header {
    position: absolute;
    top: -12%;
    left: 0;
    width: 100%;
    color: #eab308;
    text-align: center;
    font-size: 1.3vw;
    font-weight: 800;
    margin: 0;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
  }

  /* ── Dynamic Stats (Left Panel) ── */
  .stat-card {
    background: rgba(25, 37, 51, 0.7);
    border: 1px solid rgba(234, 179, 8, 0.2);
    border-radius: 8px;
    padding: 4%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
    flex: 1;
  }
  .stat-row {
    display: flex;
    gap: 4%;
    flex: 1;
  }
  .stat-row .stat-card { margin-bottom: 0; }
  
  .stat-title {
    color: #94a3b8;
    font-size: 0.9vw;
    margin-bottom: 2%;
  }
  .stat-value {
    color: #fff;
    font-size: 1.4vw;
    font-weight: 700;
    text-align: center;
  }
  .stat-value small { font-size: 0.6em; color: #cbd5e1; }
  
  .stat-value.gold { color: #eab308; font-size: 1.6vw; }

  /* ── Login Form (Right Panel) ── */
  .login-form {
    display: flex;
    flex-direction: column;
    height: 100%;
    gap: 4%;
  }

  .input-group {
    background: rgba(15, 22, 35, 0.8);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 8px;
    display: flex;
    align-items: center;
    padding: 0 5%;
    height: 18%;
  }
  .input-group:focus-within {
    border-color: #3b82f6;
    box-shadow: 0 0 8px rgba(59, 130, 246, 0.5);
  }
  
  .input-icon {
    color: #3b82f6;
    font-size: 1vw;
    width: 15%;
    text-align: center;
  }
  .input-icon.gold { color: #eab308; }

  .modern-input {
    background: transparent;
    border: none;
    color: #fff;
    font-family: 'Cairo', sans-serif;
    font-size: 1vw;
    font-weight: 600;
    outline: none;
    flex: 1;
    height: 100%;
  }
  .modern-input::placeholder { color: rgba(255,255,255,0.4); }
  .modern-input option { color: #000; background: #fff; }

  .modern-btn {
    background: linear-gradient(135deg, #2563eb, #1e40af);
    border: 1px solid #3b82f6;
    border-radius: 8px;
    color: #fff;
    font-family: 'Cairo', sans-serif;
    font-size: 1.1vw;
    font-weight: 700;
    cursor: pointer;
    height: 20%;
    margin-top: auto;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4);
  }
  .modern-btn:hover {
    background: linear-gradient(135deg, #3b82f6, #2563eb);
    transform: translateY(-2px);
  }

  /* ── Error Message ── */
  .login-error {
    color: #ef4444; font-size: 0.9vw; font-weight: bold; text-align: center;
    background: rgba(15,22,35,0.9); padding: 2%; border-radius: 5px;
    display: none; margin-top: 2%;
  }

</style>
</head>
<body class="index-portal">

<div class="image-map-container">
  <img src="img/index_bg.jpg?v=3" class="bg-image" alt="EHCSS Portal">

  <!-- Left Panel: CSS-Driven Stats -->
  <div class="left-panel-container">
    <div class="panel-header">مؤشرات الأداء التشغيلي</div>
    
    <div class="stat-card">
      <div class="stat-title">السعة التخزينية الإجمالية</div>
      <div class="stat-value gold" id="stat-capacity">3.1 <small>مليون طن</small></div>
    </div>
    
    <div class="stat-card">
      <div class="stat-title">عدد المناطق الجغرافية</div>
      <div class="stat-value gold" id="stat-regions">3</div>
    </div>
    
    <div class="stat-card">
      <div class="stat-title">عدد الصوامع النشطة</div>
      <div class="stat-value gold" id="stat-silos">48</div>
    </div>
    
    <div class="stat-row">
      <div class="stat-card">
        <div class="stat-title">المخزون</div>
        <div class="stat-value" id="stat-stock" style="color: #10b981;">82%</div>
      </div>
      <div class="stat-card">
        <div class="stat-title">شحنات اليوم</div>
        <div class="stat-value" id="stat-shipments" style="font-size: 0.9vw;">12 قطار<br>4 سفن</div>
      </div>
    </div>
  </div>

  <!-- Right Panel: CSS-Driven Login Form -->
  <div class="right-panel-container">
    <div class="panel-header">بوابة دخول المستخدم</div>
    
    <form onsubmit="handleLogin(event)" class="login-form">
      
      <div class="input-group">
        <i class="fa-solid fa-building input-icon"></i>
        <select id="branchSelect" class="modern-input" onchange="fillCreds(this.value)">
          <option value="">-- اختر الفرع للبدء --</option>
          <option value="admin">الإدارة العامة (Dashboard)</option>
        </select>
      </div>
      
      <div class="input-group">
        <i class="fa-solid fa-user input-icon"></i>
        <input type="text" id="username" class="modern-input" placeholder="اسم المستخدم" required autocomplete="off">
      </div>
      
      <div class="input-group">
        <i class="fa-solid fa-key input-icon gold"></i>
        <input type="password" id="password" class="modern-input" placeholder="كلمة المرور" required>
      </div>
      
      <button type="submit" class="modern-btn" id="loginBtn">تسجيل الدخول <i class="fa-solid fa-arrow-left-to-bracket" style="margin-right:5px;"></i></button>
      <div id="loginError" class="login-error">بيانات الدخول غير صحيحة</div>
      
    </form>
  </div>

</div>

<script src="js/data.js?v=23"></script>
<script src="js/app.js?v=23"></script>
<script>
  // Auto-redirect
  if (Auth.current()) {
    const r = Auth.current().role;
    if (r === 'silo') window.location.href = 'pages/silo_portal.html?v=23';
    else if (r === 'scale') window.location.href = 'pages/reception.html?v=23';
    else if (r === 'security') window.location.href = 'pages/security.html?v=23';
    else if (r === 'finance') window.location.href = 'pages/finance.html?v=23';
    else if (r === 'maintenance') window.location.href = 'pages/maintenance.html?v=23';
    else window.location.href = 'pages/dashboard.html?v=23';
  }

  const select = document.getElementById('branchSelect');
  const storedUsers = JSON.parse(localStorage.getItem('USERS') || '[]');
  const usersToLoad = storedUsers.length > 0 ? storedUsers : (typeof USERS !== 'undefined' ? USERS : []);
  
  usersToLoad.filter(u => u.role === 'silo').forEach(u => {
    const opt = document.createElement('option');
    opt.value = u.username;
    opt.textContent = u.name;
    select.appendChild(opt);
  });

  function fillCreds(username) {
    if (!username) {
      document.getElementById('username').value = '';
      document.getElementById('password').value = '';
      return;
    }
    const user = usersToLoad.find(u => u.username === username);
    if (user) {
      document.getElementById('username').value = user.username;
      document.getElementById('password').value = user.password;
    }
  }

  function handleLogin(e) {
    e.preventDefault();
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value;
    
    const user = Auth.login(u, p);
    if (user) {
      const r = user.role;
      if (r === 'silo') window.location.href = 'pages/silo_portal.html?v=23';
      else if (r === 'scale') window.location.href = 'pages/reception.html?v=23';
      else if (r === 'security') window.location.href = 'pages/security.html?v=23';
      else if (r === 'finance') window.location.href = 'pages/finance.html?v=23';
      else if (r === 'maintenance') window.location.href = 'pages/maintenance.html?v=23';
      else window.location.href = 'pages/dashboard.html?v=23';
    } else {
      document.getElementById('loginError').style.display = 'block';
    }
  }

  document.getElementById('stat-regions').textContent = '3';
  document.getElementById('stat-silos').textContent = SILOS ? SILOS.length : '48';
  
  let totalCap = 0;
  if(typeof CELLS !== 'undefined') totalCap = CELLS.reduce((acc, c) => acc + c.capacity, 0);
  else totalCap = 3100000;
  
  document.getElementById('stat-capacity').innerHTML = (totalCap / 1000000).toFixed(1) + ' <small>مليون طن</small>';
  document.getElementById('stat-stock').textContent = '82%';
  document.getElementById('stat-shipments').innerHTML = Math.floor(Math.random() * 20 + 5) + ' قطار<br>' + Math.floor(Math.random() * 5 + 1) + ' سفن';
</script>
</body>
</html>
