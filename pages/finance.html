<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الشئون المالية والإدارية — نظام إدارة الصوامع</title>
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script src="../js/firebase-db.js"></script></head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="app-sidebar"></aside>

  <main class="main-content">
    <header class="top-header">
      <div>
        <div class="header-title">إدارة الشئون المالية والإدارية</div>
        <div class="header-sub">تسجيل ومتابعة المصروفات والعهد والإيرادات</div>
      </div>
      <div class="header-actions">
        <div class="header-date" id="clockEl"></div>
        <button class="btn btn-success" onclick="openForm()">
          <i class="fa-solid fa-plus"></i> إضافة مستند جديد
        </button>
      </div>
    </header>

    <div class="page-content">
      <div class="form-card hidden" id="entryForm">
        <div class="card-header">
          <div>
            <div class="card-title"><i class="fa-solid fa-money-check-dollar"></i> مستند مالي جديد</div>
          </div>
          <button class="btn btn-outline btn-sm" onclick="closeForm()">
            <i class="fa-solid fa-xmark"></i> إغلاق
          </button>
        </div>
        <div class="form-grid">
          <div class="form-group-inner">
            <label>نوع المستند *</label>
            <select class="form-control" id="f_type">
              <option value="مصروفات نثرية">مصروفات نثرية</option>
              <option value="سلفة مؤقتة">سلفة مؤقتة</option>
              <option value="تسوية سلفة">تسوية سلفة</option>
              <option value="إيرادات أخرى">إيرادات أخرى</option>
            </select>
          </div>
          <div class="form-group-inner">
            <label>المبلغ (جنيه) *</label>
            <input type="number" class="form-control" id="f_amount" placeholder="مثال: 1500">
          </div>
          <div class="form-group-inner">
            <label>الإدارة الطالبة</label>
            <input type="text" class="form-control" id="f_req_by" placeholder="مثال: إدارة الحركة">
          </div>
          <div class="form-group-inner" style="grid-column: 1 / -1">
            <label>البيان / الوصف *</label>
            <input type="text" class="form-control" id="f_desc" placeholder="أدخل تفاصيل المستند">
          </div>
        </div>
        <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px;">
          <button class="btn btn-outline" onclick="closeForm()">إلغاء</button>
          <button class="btn btn-success" onclick="saveEntry()">
            <i class="fa-solid fa-floppy-disk"></i> حفظ
          </button>
        </div>
      </div>

      <div class="table-card">
        <div class="table-header">
          <div class="card-title">سجل الحركة المالية</div>
        </div>
        <div style="overflow-x:auto">
          <table class="data-table">
            <thead>
              <tr>
                <th>رقم المستند</th>
                <th>التاريخ</th>
                <th>النوع</th>
                <th>البيان</th>
                <th>المبلغ (ج.م)</th>
                <th>الإدارة الطالبة</th>
                <th>الحالة</th>
              </tr>
            </thead>
            <tbody id="financeBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="../js/data.js"></script>
<script src="../js/app.js"></script>
<script>
const user = Auth.require(['finance', 'manager', 'general_admin']);
if (user.role === 'general_admin') {
  window.location.href = 'dashboard.html';
}
buildSidebar('finance');
initClock(document.getElementById('clockEl'));

let myData = FINANCE.filter(f => f.silo_id === user.silo_id);

function renderTable() {
  const tbody = document.getElementById('financeBody');
  if (myData.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center">لا توجد بيانات مالية مسجلة</td></tr>';
    return;
  }
  tbody.innerHTML = '';
  myData.forEach(f => {
    const badge = f.status === 'approved' ? '<span class="badge badge-success">معتمد</span>' : '<span class="badge badge-warning">قيد المراجعة</span>';
    tbody.innerHTML += `
      <tr>
        <td class="fw-bold text-info">${f.id}</td>
        <td>${f.date}</td>
        <td><span class="badge badge-purple">${f.type}</span></td>
        <td>${f.desc}</td>
        <td class="fw-bold">${f.amount.toLocaleString('ar-EG')}</td>
        <td>${f.req_by}</td>
        <td>${badge}</td>
      </tr>`;
  });
}

function openForm() {
  document.getElementById('entryForm').classList.remove('hidden');
}

function closeForm() {
  document.getElementById('entryForm').classList.add('hidden');
}

function saveEntry() {
  const type = document.getElementById('f_type').value;
  const amount = +document.getElementById('f_amount').value;
  const req = document.getElementById('f_req_by').value || 'غير محدد';
  const desc = document.getElementById('f_desc').value;

  if (!amount || !desc) {
    showToast('يرجى إدخال المبلغ والبيان', 'warning');
    return;
  }

  const newId = 'FIN-2026-' + String(Math.floor(Math.random()*1000)).padStart(3,'0');
  const entry = {
    id: newId,
    silo_id: user.silo_id,
    date: new Date().toLocaleDateString('ar-EG'),
    type: type,
    amount: amount,
    desc: desc,
    req_by: req,
    status: 'pending'
  };

  myData.unshift(entry);
  renderTable();
  closeForm();
  showToast('تم حفظ المستند المالي بنجاح', 'success');
}

renderTable();
</script>
</body>
</html>
